{% set version = "0.15.3" %}
{% set python_min = "3.10" %}

package:
  name: pygfx
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/p/pygfx/pygfx-{{ version }}.tar.gz
  sha256: 917d05b9a636c81af4754aeca50af8f95f6a29612c6341f64b5a8f069522edc3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
    - flit-core
  run:
    - python >={{ python_min }}
    - numpy
    - rendercanvas >=2.2,!=2.3.0,!=2.4.0
    - wgpu-py >=0.24.0,<0.30
    - pylinalg >=0.6.8,<0.7.0
    - freetype-py
    - uharfbuzz
    - jinja2
    - hsluv >=5.0.0

test:
  imports:
    - pygfx
  requires:
    - python {{ python_min }}
    - pip
  commands:
    - pip check
about:
  home: https://github.com/pygfx/pygfx
  summary: "Pygfx' purpose is to bring powerful and reliable visualization to the Python world. 🚀"
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - hmaarrfk
